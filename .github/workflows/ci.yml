name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -m py_compile aws_cost_check.py

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check aws_cost_check.py
